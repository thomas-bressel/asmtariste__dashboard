name: Deploy to Staging

on:
  workflow_run:
    workflows: ["Projet Asmtariste - Dashboard CI"]
    types:
      - completed
    branches:
      - staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    
    steps:
    - name: Download build artifacts
      uses: actions/github-script@v7
      with:
        script: |
          let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
             owner: context.repo.owner,
             repo: context.repo.repo,
             run_id: context.payload.workflow_run.id,
          });
          let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "angular-build-develop"
          })[0];
          let download = await github.rest.actions.downloadArtifact({
             owner: context.repo.owner,
             repo: context.repo.repo,
             artifact_id: matchArtifact.id,
             archive_format: 'zip',
          });
          let fs = require('fs');
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/angular-build.zip`, Buffer.from(download.data));

    - name: Extract artifacts
      run: |
        unzip angular-build.zip
        ls -la
    
    - name: Deploy to Staging FTP Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /dashboard-staging.asmtariste.fr/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          angular-build.zip